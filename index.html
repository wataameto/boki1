<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>簿記テスト（分記法）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 700px;
      width: 100%;
      padding: 32px 28px;
    }

    h1 { text-align: center; font-size: 1.6rem; color: #1a2a3a; margin-bottom: 8px; }

    .subtitle { text-align: center; color: #6b7a8d; font-size: 0.9rem; margin-bottom: 28px; }

    /* HOME */
    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .test-card {
      border: 2px solid #d0dce8;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fbff;
    }

    .test-card:hover { border-color: #4a90d9; background: #eaf3fb; transform: translateY(-2px); }
    .test-card h2 { font-size: 1.1rem; color: #1a2a3a; margin-bottom: 4px; }
    .test-card .test-type { font-size: 0.78rem; color: #4a90d9; margin-bottom: 8px; font-weight: bold; }
    .test-card .best-score { font-size: 0.85rem; color: #6b7a8d; }
    .test-card .best-score span { font-weight: bold; color: #4a90d9; }

    /* QUIZ */
    .progress-bar-wrap { background: #e2eaf2; border-radius: 99px; height: 8px; margin-bottom: 6px; }
    .progress-bar { background: #4a90d9; height: 100%; border-radius: 99px; transition: width 0.4s; }
    .progress-label { font-size: 0.8rem; color: #6b7a8d; text-align: right; margin-bottom: 20px; }

    .scenario {
      background: #f4f7fa;
      border-left: 4px solid #4a90d9;
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 1.05rem;
      color: #1a2a3a;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .choices { display: flex; flex-direction: column; gap: 12px; }

    .choice-btn {
      border: 2px solid #d0dce8;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      background: #fff;
      transition: all 0.15s;
      width: 100%;
      font-size: 0.95rem;
      color: #1a2a3a;
      line-height: 1.5;
    }

    .choice-btn:not([disabled]):hover { border-color: #4a90d9; background: #eaf3fb; }
    .choice-btn.correct { border-color: #27ae60; background: #eafaf1; }
    .choice-btn.wrong   { border-color: #e74c3c; background: #fdf0ef; }
    .choice-btn.reveal  { border-color: #27ae60; background: #eafaf1; }

    /* 仕訳表示 */
    .journal {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 4px 8px;
      font-size: 0.88rem;
    }

    .journal-header { font-size: 0.75rem; color: #888; font-weight: bold; }
    .journal-debit  { color: #1a5276; }
    .journal-credit { color: #6e2f0a; padding-left: 16px; }
    .journal-sep    { color: #ccc; display: flex; align-items: center; justify-content: center; }
    .entry-line     { display: flex; flex-direction: column; gap: 2px; }
    .entry-item     { display: flex; justify-content: space-between; gap: 12px; }

    .feedback {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      display: none;
    }

    .feedback.correct { background: #eafaf1; color: #1e8449; display: block; }
    .feedback.wrong   { background: #fdf0ef; color: #c0392b; display: block; }

    .next-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    .next-btn:hover { background: #2d78c8; }

    /* RESULTS */
    .result-score { text-align: center; margin: 24px 0; }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #eaf3fb;
      border: 6px solid #4a90d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .score-num   { font-size: 2.6rem; font-weight: bold; color: #1a2a3a; line-height: 1; }
    .score-label { font-size: 0.85rem; color: #6b7a8d; }
    .score-msg   { font-size: 1.1rem; color: #1a2a3a; margin-bottom: 4px; }
    .best-msg    { font-size: 0.9rem; color: #27ae60; font-weight: bold; }

    .result-detail { border-top: 1px solid #e2eaf2; margin-top: 20px; padding-top: 16px; }
    .result-detail h3 { font-size: 1rem; color: #6b7a8d; margin-bottom: 12px; }

    .answer-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f4f8;
      font-size: 0.85rem;
    }

    .q-num         { min-width: 28px; font-weight: bold; color: #6b7a8d; }
    .mark          { font-size: 1.1rem; min-width: 22px; }
    .answer-detail { color: #1a2a3a; line-height: 1.6; }

    .home-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #6b7a8d;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .home-btn:hover { background: #4a5568; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <div id="screen-home">
    <h1>簿記テスト</h1>
    <p class="subtitle">分記法（商品売買益）レベル ／ 各10問・100点満点</p>
    <div class="test-grid" id="test-grid"></div>
  </div>

  <div id="screen-quiz" class="hidden">
    <h1 id="quiz-title"></h1>
    <p class="subtitle" id="quiz-subtitle"></p>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label" id="progress-label"></div>
    <div class="scenario" id="scenario"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn"></button>
  </div>

  <div id="screen-results" class="hidden">
    <h1 id="result-title"></h1>
    <div class="result-score">
      <div class="score-circle">
        <span class="score-num" id="score-num"></span>
        <span class="score-label">点 / 100点</span>
      </div>
      <p class="score-msg" id="score-msg"></p>
      <p class="best-msg" id="best-msg"></p>
    </div>
    <div class="result-detail">
      <h3>解答一覧</h3>
      <div id="answer-list"></div>
    </div>
    <button class="home-btn" onclick="showHome()">テスト選択に戻る</button>
  </div>

</div>

<script>
// ============================================================
// データ定義
// ============================================================

// テスト１：用語問題
const TEST1 = {
  id: 1,
  title: 'テスト１',
  type: '用語問題',
  subtitle: '正しい説明を選んでください',
  questions: [
    {
      scenario: '「仕訳」とは何か？',
      choices: [
        '取引を借方と貸方に分けて記録すること',
        '勘定科目の残高を集計すること',
        '決算書を作成すること',
        '現金の入出金だけを記録すること',
      ],
      correct: 0,
    },
    {
      scenario: '「分記法」とは何か？',
      choices: [
        '商品の原価と売却益を分けて記録する方法',
        '費用と収益を合算して記録する方法',
        '資産と負債を一括して記録する方法',
        '仕入れと売上を同じ科目で記録する方法',
      ],
      correct: 0,
    },
    {
      scenario: '「商品売買益」とは何か？',
      choices: [
        '商品を原価より高く売ったときに生じる利益',
        '商品を仕入れたときにかかった費用',
        '商品の在庫として残っている金額',
        '商品を売った総額（売上高）',
      ],
      correct: 0,
    },
    {
      scenario: '「売掛金」とは何か？',
      choices: [
        '商品を掛けで売ったときに生じる代金の受取権利',
        '商品を掛けで買ったときに生じる代金の支払義務',
        '現金で受け取った売上代金',
        '商品を売ったときに発生する利益',
      ],
      correct: 0,
    },
    {
      scenario: '「買掛金」とは何か？',
      choices: [
        '商品を掛けで買ったときに生じる代金の支払義務',
        '商品を掛けで売ったときに生じる代金の受取権利',
        '現金で支払った仕入代金',
        '商品を買ったときに発生する費用',
      ],
      correct: 0,
    },
    {
      scenario: '「借方」とはどちら側か？',
      choices: [
        '仕訳の左側',
        '仕訳の右側',
        '負債が増える側',
        '収益が増える側',
      ],
      correct: 0,
    },
    {
      scenario: '「貸方」とはどちら側か？',
      choices: [
        '仕訳の右側',
        '仕訳の左側',
        '資産が増える側',
        '費用が増える側',
      ],
      correct: 0,
    },
    {
      scenario: '「掛け」取引とは？',
      choices: [
        '代金を後払いにする取引',
        '代金を前払いにする取引',
        '現金で即時に支払う取引',
        '手形を使って支払う取引',
      ],
      correct: 0,
    },
    {
      scenario: '「原価」とは？',
      choices: [
        '商品を仕入れたときにかかった費用',
        '商品を売ったときの販売価格',
        '商品を売ったときに得られる利益',
        '決算時の在庫評価額',
      ],
      correct: 0,
    },
    {
      scenario: '「勘定科目」とは？',
      choices: [
        '取引の内容を分類するための名称',
        '仕訳帳のページ番号',
        '会計期間中の合計金額',
        '決算書の様式名',
      ],
      correct: 0,
    },
  ],
};

// テスト２：勘定科目の区分問題
const TEST2 = {
  id: 2,
  title: 'テスト２',
  type: '区分問題',
  subtitle: '正しい区分・説明を選んでください',
  questions: [
    {
      scenario: '「現金」はどの区分か？',
      choices: ['資産', '負債', '収益', '費用'],
      correct: 0,
    },
    {
      scenario: '「売掛金」はどの区分か？',
      choices: ['資産', '負債', '収益', '費用'],
      correct: 0,
    },
    {
      scenario: '「買掛金」はどの区分か？',
      choices: ['負債', '資産', '費用', '収益'],
      correct: 0,
    },
    {
      scenario: '「商品」はどの区分か？',
      choices: ['資産', '費用', '負債', '収益'],
      correct: 0,
    },
    {
      scenario: '「商品売買益」はどの区分か？',
      choices: ['収益', '費用', '資産', '負債'],
      correct: 0,
    },
    {
      scenario: '「資本金」はどの区分か？',
      choices: ['純資産（資本）', '負債', '資産', '収益'],
      correct: 0,
    },
    {
      scenario: '資産の勘定は、増加するときどちらに記入するか？',
      choices: ['借方（左側）', '貸方（右側）', '両側に同額', 'どちらでもよい'],
      correct: 0,
    },
    {
      scenario: '負債の勘定は、増加するときどちらに記入するか？',
      choices: ['貸方（右側）', '借方（左側）', '両側に同額', 'どちらでもよい'],
      correct: 0,
    },
    {
      scenario: '収益の勘定は、発生するときどちらに記入するか？',
      choices: ['貸方（右側）', '借方（左側）', '両側に同額', 'どちらでもよい'],
      correct: 0,
    },
    {
      scenario: '「売掛金」の残高は通常どちら側にあるか？',
      choices: ['借方（左側）', '貸方（右側）', 'ゼロになる', '両側にある'],
      correct: 0,
    },
  ],
};

// テスト３：仕訳問題
function j(debit, credit) { return { debit, credit }; }
function e(account, amount) { return { account, amount }; }

const TEST3 = {
  id: 3,
  title: 'テスト３',
  type: '仕訳問題',
  subtitle: '正しい仕訳を選んでください',
  questions: [
    {
      scenario: '商品¥10,000を現金で仕入れた。',
      choices: [
        j([e('商品',10000)],[e('現金',10000)]),
        j([e('現金',10000)],[e('商品',10000)]),
        j([e('商品',10000)],[e('買掛金',10000)]),
        j([e('買掛金',10000)],[e('商品',10000)]),
      ],
      correct: 0,
    },
    {
      scenario: '原価¥8,000の商品を¥12,000で現金販売した。',
      choices: [
        j([e('現金',12000)],[e('商品',8000),e('商品売買益',4000)]),
        j([e('現金',12000)],[e('商品',12000)]),
        j([e('現金',8000),e('商品売買益',4000)],[e('商品',12000)]),
        j([e('商品',8000)],[e('現金',12000),e('商品売買益',4000)]),
      ],
      correct: 0,
    },
    {
      scenario: '商品¥15,000を掛けで仕入れた。',
      choices: [
        j([e('商品',15000)],[e('買掛金',15000)]),
        j([e('買掛金',15000)],[e('商品',15000)]),
        j([e('商品',15000)],[e('現金',15000)]),
        j([e('売掛金',15000)],[e('商品',15000)]),
      ],
      correct: 0,
    },
    {
      scenario: '原価¥6,000の商品を¥9,000で掛け販売した。',
      choices: [
        j([e('売掛金',9000)],[e('商品',6000),e('商品売買益',3000)]),
        j([e('売掛金',9000)],[e('商品',9000)]),
        j([e('現金',9000)],[e('商品',6000),e('商品売買益',3000)]),
        j([e('商品',6000),e('商品売買益',3000)],[e('売掛金',9000)]),
      ],
      correct: 0,
    },
    {
      scenario: '買掛金¥15,000を現金で支払った。',
      choices: [
        j([e('買掛金',15000)],[e('現金',15000)]),
        j([e('現金',15000)],[e('買掛金',15000)]),
        j([e('売掛金',15000)],[e('現金',15000)]),
        j([e('現金',15000)],[e('売掛金',15000)]),
      ],
      correct: 0,
    },
    {
      scenario: '売掛金¥9,000を現金で回収した。',
      choices: [
        j([e('現金',9000)],[e('売掛金',9000)]),
        j([e('売掛金',9000)],[e('現金',9000)]),
        j([e('現金',9000)],[e('買掛金',9000)]),
        j([e('買掛金',9000)],[e('現金',9000)]),
      ],
      correct: 0,
    },
    {
      scenario: '原価¥10,000の商品を¥14,000で現金販売した。',
      choices: [
        j([e('現金',14000)],[e('商品',10000),e('商品売買益',4000)]),
        j([e('現金',14000)],[e('商品',14000)]),
        j([e('現金',10000),e('商品売買益',4000)],[e('商品',14000)]),
        j([e('商品',10000)],[e('現金',14000),e('商品売買益',4000)]),
      ],
      correct: 0,
    },
    {
      scenario: '商品¥20,000を掛けで仕入れた。',
      choices: [
        j([e('商品',20000)],[e('買掛金',20000)]),
        j([e('買掛金',20000)],[e('商品',20000)]),
        j([e('商品',20000)],[e('現金',20000)]),
        j([e('現金',20000)],[e('商品',20000)]),
      ],
      correct: 0,
    },
    {
      scenario: '原価¥15,000の商品を¥22,000で掛け販売した。',
      choices: [
        j([e('売掛金',22000)],[e('商品',15000),e('商品売買益',7000)]),
        j([e('売掛金',22000)],[e('商品',22000)]),
        j([e('現金',22000)],[e('商品',15000),e('商品売買益',7000)]),
        j([e('商品',15000),e('商品売買益',7000)],[e('売掛金',22000)]),
      ],
      correct: 0,
    },
    {
      scenario: '買掛金¥20,000を現金で支払った。',
      choices: [
        j([e('買掛金',20000)],[e('現金',20000)]),
        j([e('現金',20000)],[e('買掛金',20000)]),
        j([e('買掛金',20000)],[e('売掛金',20000)]),
        j([e('現金',20000)],[e('売掛金',20000)]),
      ],
      correct: 0,
    },
  ],
};

const TESTS = [TEST1, TEST2, TEST3];

// ============================================================
// 状態
// ============================================================

let currentTest = null;
let currentQ = 0;
let answers = [];
let shuffledChoices = [];

function getBest(id)    { return parseInt(localStorage.getItem(`best_${id}`) || '0', 10); }
function setBest(id, s) { if (s > getBest(id)) localStorage.setItem(`best_${id}`, s); }
function fmt(n)         { return '¥' + n.toLocaleString(); }

// ============================================================
// 仕訳レンダリング（テスト３用）
// ============================================================

function renderJournal(entry) {
  const dLines = entry.debit.map(e =>
    `<div class="entry-item journal-debit"><span>${e.account}</span><span>${fmt(e.amount)}</span></div>`
  ).join('');
  const cLines = entry.credit.map(e =>
    `<div class="entry-item journal-credit"><span>${e.account}</span><span>${fmt(e.amount)}</span></div>`
  ).join('');
  return `<div class="journal">
    <div><div class="journal-header">借方（左）</div><div class="entry-line">${dLines}</div></div>
    <div class="journal-sep">／</div>
    <div><div class="journal-header">貸方（右）</div><div class="entry-line">${cLines}</div></div>
  </div>`;
}

function journalText(entry) {
  const d = entry.debit.map(e => `${e.account} ${fmt(e.amount)}`).join('・');
  const c = entry.credit.map(e => `${e.account} ${fmt(e.amount)}`).join('・');
  return `借: ${d} ／ 貸: ${c}`;
}

// ============================================================
// 画面制御
// ============================================================

function showHome() {
  document.getElementById('screen-home').classList.remove('hidden');
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  document.getElementById('test-grid').innerHTML = TESTS.map(t => {
    const best = getBest(t.id);
    return `<div class="test-card" onclick="startTest(${t.id})">
      <h2>${t.title}</h2>
      <p class="test-type">${t.type}</p>
      <p class="best-score">最高得点: <span>${best > 0 ? best + '点' : '未挑戦'}</span></p>
    </div>`;
  }).join('');
}

function startTest(id) {
  currentTest = TESTS.find(t => t.id === id);
  currentQ = 0;
  answers = [];
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  document.getElementById('screen-results').classList.add('hidden');
  renderQuestion();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestion() {
  const q = currentTest.questions[currentQ];
  const total = currentTest.questions.length;
  const isJournal = currentTest.id === 3;

  document.getElementById('quiz-title').textContent = currentTest.title;
  document.getElementById('quiz-subtitle').textContent = currentTest.subtitle;
  document.getElementById('progress-bar').style.width = `${(currentQ / total) * 100}%`;
  document.getElementById('progress-label').textContent = `第 ${currentQ + 1} 問 ／ ${total} 問`;
  document.getElementById('scenario').textContent = q.scenario;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  // シャッフル
  const indexed = shuffle(q.choices.map((c, i) => ({ choice: c, origIdx: i })));
  shuffledChoices = indexed;
  const correctShuffledIdx = indexed.findIndex(x => x.origIdx === q.correct);

  document.getElementById('choices').innerHTML = indexed.map((item, i) => {
    const label = isJournal ? renderJournal(item.choice) : item.choice;
    return `<button class="choice-btn" onclick="answer(${i}, ${correctShuffledIdx})" id="choice-${i}">${label}</button>`;
  }).join('');
}

function answer(idx, correctIdx) {
  const q = currentTest.questions[currentQ];
  const isJournal = currentTest.id === 3;
  const ok = idx === correctIdx;
  answers.push({ correct: ok, chosenOrigIdx: shuffledChoices[idx].origIdx });

  shuffledChoices.forEach((_, i) => { document.getElementById(`choice-${i}`).disabled = true; });
  document.getElementById(`choice-${idx}`).classList.add(ok ? 'correct' : 'wrong');
  if (!ok) document.getElementById(`choice-${correctIdx}`).classList.add('reveal');

  const fb = document.getElementById('feedback');
  fb.className = `feedback ${ok ? 'correct' : 'wrong'}`;
  fb.textContent = ok ? '○ 正解！' : '✕ 不正解';

  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  const isLast = currentQ === currentTest.questions.length - 1;
  nb.textContent = isLast ? '結果を見る →' : '次の問題 →';
  nb.onclick = isLast ? showResults : nextQuestion;
}

function nextQuestion() { currentQ++; renderQuestion(); }

function showResults() {
  const total = currentTest.questions.length;
  const correct = answers.filter(a => a.correct).length;
  const score = Math.round((correct / total) * 100);
  setBest(currentTest.id, score);
  const best = getBest(currentTest.id);
  const isJournal = currentTest.id === 3;

  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-results').classList.remove('hidden');
  document.getElementById('result-title').textContent = currentTest.title + ' 結果';
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-msg').textContent =
    score === 100 ? '満点です！素晴らしい！🎉' :
    score >= 80   ? 'よくできました！' :
    score >= 60   ? 'もう少しです、再挑戦してみましょう！' :
                    '復習してから再挑戦してみましょう！';
  document.getElementById('best-msg').textContent =
    `最高得点: ${best}点${score >= best && score > 0 ? '（更新！）' : ''}`;

  document.getElementById('answer-list').innerHTML = currentTest.questions.map((q, i) => {
    const ans = answers[i];
    const color = ans.correct ? '#27ae60' : '#e74c3c';
    const correctChoice = q.choices[q.correct];
    const chosenChoice  = q.choices[ans.chosenOrigIdx];
    const correctText = isJournal ? journalText(correctChoice) : correctChoice;
    const chosenText  = isJournal ? journalText(chosenChoice)  : chosenChoice;
    let detail = `<span>${q.scenario}</span><br><span style="color:#555">正解: ${correctText}</span>`;
    if (!ans.correct) detail += `<br><span style="color:#c0392b">あなたの回答: ${chosenText}</span>`;
    return `<div class="answer-row">
      <span class="q-num">Q${i + 1}</span>
      <span class="mark" style="color:${color}">${ans.correct ? '○' : '✕'}</span>
      <div class="answer-detail">${detail}</div>
    </div>`;
  }).join('');
}

showHome();
</script>

</html>
